name: VLESS + Cloudflare Tunnel

on:
  push:
    branches:
      - main

jobs:
  vless:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: تثبيت الحزم
        run: |
          sudo apt update
          sudo apt install -y curl wget openssh-server unzip jq python3 openssl

      - name: إعداد SSH
        run: |
          sudo mkdir -p /var/run/sshd
          echo "root:admin123" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart
          echo "✅ SSH جاهز"

      - name: تثبيت Xray
        run: |
          cd /tmp
          curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip -o xray.zip
          sudo mv xray /usr/local/bin/
          sudo chmod +x /usr/local/bin/xray
          sudo mkdir -p /usr/local/etc/xray
          
          # إنشاء شهادة TLS بسيطة
          openssl req -x509 -newkey rsa:4096 -keyout /tmp/key.pem -out /tmp/cert.pem -days 365 -nodes -subj "/CN=localhost"
          sudo mv /tmp/key.pem /usr/local/etc/xray/key.pem
          sudo mv /tmp/cert.pem /usr/local/etc/xray/cert.pem
          
          echo "✅ Xray مثبت"

      - name: إعداد VLESS
        run: |
          UUID="d6b4c3a2-1f0e-4d5c-8b7a-9e6f2c3a4b5d"
          
          sudo tee /usr/local/etc/xray/config.json << EOF
          {
            "inbounds": [
              {
                "port": 8080,
                "protocol": "vless",
                "settings": {
                  "clients": [{"id": "${UUID}"}],
                  "decryption": "none"
                },
                "streamSettings": {
                  "network": "ws",
                  "wsSettings": {"path": "/vless"}
                }
              }
            ],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF
          
          sudo /usr/local/bin/xray -c /usr/local/etc/xray/config.json &
          sleep 3
          echo "✅ VLESS على المنفذ 8080"

      - name: تثبيت Cloudflare Tunnel
        run: |
          # تثبيت cloudflared
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
          echo "✅ Cloudflared مثبت"

      - name: تشغيل Cloudflare Tunnel
        run: |
          # تشغيل النفق (بدون حساب - وضع تجريبي)
          /usr/local/bin/cloudflared tunnel --url http://localhost:8080 --protocol http2 > /tmp/cloudflare.log 2>&1 &
          
          sleep 10
          
          # استخراج الرابط
          CLOUDFLARE_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' /tmp/cloudflare.log | head -1)
          
          echo "==========================================="
          echo "🔥 VLESS عبر Cloudflare جاهز 🔥"
          echo "==========================================="
          echo ""
          
          if [ ! -z "$CLOUDFLARE_URL" ]; then
            VLESS_HOST=$(echo "$CLOUDFLARE_URL" | sed 's|https://||')
            UUID="d6b4c3a2-1f0e-4d5c-8b7a-9e6f2c3a4b5d"
            
            VLESS_LINK="vless://${UUID}@${VLESS_HOST}:443?encryption=none&security=none&type=ws&host=${VLESS_HOST}&path=%2Fvless#VLESS-CF"
            
            echo "🔗 رابط VLESS (انسخ هذا):"
            echo "$VLESS_LINK"
            echo ""
            echo "📝 أو الإعدادات يدوياً:"
            echo "   السيرفر: ${VLESS_HOST}"
            echo "   المنفذ: 443"
            echo "   UUID: ${UUID}"
            echo "   المسار: /vless"
            echo "   النقل: WebSocket"
            echo "==========================================="
          else
            echo "⚠️ انتظر قليلاً..."
            sleep 10
            CLOUDFLARE_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' /tmp/cloudflare.log | head -1)
            echo "الرابط: $CLOUDFLARE_URL"
          fi

      - name: إبقاء التشغيل
        run: |
          echo "🟢 التشغيل لمدة 6 ساعات"
          echo ""
          echo "لمشاهدة الرابط مرة أخرى، افحص هذا الـ log"
          echo ""
          
          while true; do
            sleep 300
            echo "[$(date)] الجهاز نشط - اعرض الرابط من الأعلى"
          done
