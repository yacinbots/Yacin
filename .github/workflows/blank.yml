name: VLESS + Ngrok لاتصال Dark Tunnel

on:
  push:
    branches:
      - main

jobs:
  vless:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: تثبيت الحزم الأساسية
        run: |
          sudo apt update
          sudo apt install -y curl wget openssh-server unzip jq

      - name: إعداد وتشغيل SSH
        run: |
          sudo mkdir -p /var/run/sshd
          echo "root:Admin@123" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart
          echo "✅ SSH جاهز"

      - name: تثبيت Xray-core
        run: |
          curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip -o xray.zip
          sudo mv xray /usr/local/bin/
          sudo mkdir -p /usr/local/etc/xray
          sudo mkdir -p /var/log/xray
          sudo chmod +x /usr/local/bin/xray
          echo "✅ Xray مثبت"

      - name: إعداد ملف إعدادات VLESS
        run: |
          cat << 'EOF' | sudo tee /usr/local/etc/xray/config.json
          {
            "log": {
              "loglevel": "warning",
              "access": "/var/log/xray/access.log",
              "error": "/var/log/xray/error.log"
            },
            "inbounds": [
              {
                "port": 8080,
                "protocol": "vless",
                "settings": {
                  "clients": [
                    {
                      "id": "d6b4c3a2-1f0e-4d5c-8b7a-9e6f2c3a4b5d",
                      "flow": "xtls-rprx-vision"
                    }
                  ],
                  "decryption": "none"
                },
                "streamSettings": {
                  "network": "ws",
                  "wsSettings": {
                    "path": "/vless"
                  },
                  "security": "none"
                },
                "sniffing": {
                  "enabled": true,
                  "destOverride": ["http", "tls"]
                }
              }
            ],
            "outbounds": [
              {
                "protocol": "freedom",
                "tag": "direct"
              }
            ]
          }
          EOF
          echo "✅ تم إعداد config.json"

      - name: تشغيل خدمة Xray
        run: |
          sudo /usr/local/bin/xray -c /usr/local/etc/xray/config.json > /dev/null 2>&1 &
          sleep 3
          echo "✅ Xray يعمل على المنفذ 8080"

      - name: تثبيت Ngrok
        run: |
          curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.zip -o ngrok.zip
          unzip -o ngrok.zip
          sudo mv ngrok /usr/local/bin/ngrok
          ngrok config add-authtoken 2gzCXiehyX6Dvdjyam6CeA3P7wN_4ZRSp9hHWtNdUrEMfW7A5
          echo "✅ Ngrok مثبت"

      - name: تشغيل Ngrok لنفق WebSocket
        run: |
          ngrok http 8080 --host-header="localhost" --log=stdout > /dev/null 2>&1 &
          sleep 15
          echo "✅ Ngrok يعمل"

      - name: إنشاء رابط VLESS لـ Dark Tunnel
        run: |
          sleep 5
          
          # الحصول على رابط Ngrok
          NGROK_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[] | select(.proto=="https") | .public_url' | head -1)
          
          if [ -z "$NGROK_URL" ]; then
            NGROK_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | grep -o 'https://[^"]*' | head -1)
          fi
          
          # استخراج المضيف بدون https://
          VLESS_HOST=$(echo "$NGROK_URL" | sed 's|https://||')
          
          # UUID الخاص
          UUID="d6b4c3a2-1f0e-4d5c-8b7a-9e6f2c3a4b5d"
          
          # إنشاء رابط VLESS
          VLESS_LINK="vless://${UUID}@${VLESS_HOST}:443?encryption=none&security=none&type=ws&host=${VLESS_HOST}&path=%2Fvless#GitHub-VLESS"
          
          echo "==========================================="
          echo "🔥 VLESS جاهز للاتصال عبر Dark Tunnel 🔥"
          echo "==========================================="
          echo ""
          echo "📱 معلومات SSH (للطوارئ):"
          SSH_INFO=$(curl -s http://127.0.0.1:4040/api/tunnels | grep -o 'tcp://[^"]*' | head -1)
          if [ ! -z "$SSH_INFO" ]; then
            SSH_HOST=$(echo $SSH_INFO | sed 's/tcp:\/\///' | cut -d: -f1)
            SSH_PORT=$(echo $SSH_INFO | sed 's/tcp:\/\///' | cut -d: -f2)
            echo "   ssh root@$SSH_HOST -p $SSH_PORT"
            echo "   password: Admin@123"
          fi
          echo ""
          echo "==========================================="
          echo "🔗 رابط VLESS لـ Dark Tunnel (انسخ هذا):"
          echo "==========================================="
          echo "$VLESS_LINK"
          echo "==========================================="
          echo ""
          echo "📝 إعدادات Dark Tunnel:"
          echo "   النوع: VLESS"
          echo "   عنوان السيرفر: $VLESS_HOST"
          echo "   المنفذ: 443"
          echo "   المعرف (UUID): $UUID"
          echo "   النقل: WebSocket (ws)"
          echo "   المسار: /vless"
          echo "   الأمان: none"
          echo "==========================================="
          echo ""
          echo "⏳ المدة: 6 ساعات"
          echo "==========================================="
          
          # حفظ الرابط في ملف
          echo "$VLESS_LINK" > ~/vless_link.txt
          cat ~/vless_link.txt

      - name: إبقاء الجهاز نشطاً
        run: |
          while true; do
            sleep 300
            echo "💓 الجهاز لا يزال نشط - $(date)"
          done
